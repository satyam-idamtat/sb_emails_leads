<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SourceBuddy // My Companies</title><link rel="stylesheet" href="style.css"><link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"><style>body{min-height:100vh;overflow:auto}.user-shell{position:relative;z-index:1;max-width:1320px;margin:auto;padding:30px}.user-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:32px}.user-head h1{font-size:46px;color:var(--cyan)}.user-head p{color:var(--muted);margin-top:5px}.identity{font:11px 'DM Mono';color:var(--amber);letter-spacing:.1em}.summary{display:flex;gap:15px;margin-bottom:24px}.summary-card{min-width:170px;padding:17px;background:rgba(13,24,38,.92);border:1px solid var(--border)}.summary-card strong{display:block;font:38px 'Big Shoulders Display';color:var(--cyan)}.summary-card span{font:10px 'DM Mono';color:var(--muted);letter-spacing:.12em}.search-wrap{display:flex;gap:14px;align-items:center;background:rgba(13,24,38,.92);border:1px solid var(--border);padding:14px;margin-bottom:18px}.search-wrap input{flex:1;background:var(--void);border:1px solid var(--border);padding:11px;color:var(--text)}.company-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}.company-card{background:rgba(13,24,38,.94);border:1px solid var(--border);padding:19px;min-height:190px;transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease}.company-card:hover{transform:translateY(-5px);border-color:var(--cyan);box-shadow:0 16px 28px rgba(0,0,0,.28)}.company-card h2{font-size:25px;line-height:1;color:var(--text);margin:8px 0 14px}.company-card p{color:var(--muted);font-size:13px;margin:7px 0;overflow-wrap:anywhere}.company-card a{color:var(--cyan)}.tag{display:inline-block;background:rgba(79,216,224,.12);border:1px solid rgba(79,216,224,.3);padding:4px 7px;color:var(--cyan);font:10px 'DM Mono';margin:8px 5px 0 0}.empty{padding:48px;text-align:center;background:rgba(13,24,38,.9);border:1px dashed var(--border);color:var(--muted)}@media(max-width:700px){.user-shell{padding:18px}.user-head{flex-direction:column}.user-head h1{font-size:37px}.summary{width:100%}.summary-card{flex:1}}</style></head><body><main class="user-shell"><header class="user-head"><div><span class="eyebrow">SOURCEBUDDY // ASSIGNED OPERATIONS</span><h1>My Companies</h1><p>Only companies assigned to your account are available here.</p></div><div class="identity" id="identity">SECURE SESSION</div></header><section class="summary"><div class="summary-card bracket"><strong id="count">—</strong><span>ASSIGNED COMPANIES</span></div></section><div class="search-wrap bracket"><input id="search" placeholder="Search your assigned companies, contacts or verticals…" autocomplete="off"><span class="eyebrow" id="result">LOADING</span></div><section class="company-grid" id="companies" aria-live="polite"></section></main><div class="session-actions"><span id="sessionName">SECURE SESSION</span><button id="logoutBtn" class="btn-ghost-sm">Sign out</button></div><script>const $=id=>document.getElementById(id);let rows=[];function clean(v){return String(v??'').trim()}function esc(v){const x=document.createElement('span');x.textContent=v;return x.innerHTML}function website(c){return clean(c['Unnamed: 2'])||clean(c.Website)}function primaryName(c){return clean(c.Name)||clean(c['POC 1'])}function email(c){return clean(c['Email.1'])||clean(c.Email)}function render(){const q=$('search').value.toLowerCase();const visible=rows.filter(c=>[c['Company Name'],primaryName(c),email(c),c.Vertical].map(clean).join(' ').toLowerCase().includes(q));$('result').textContent=`${visible.length} SHOWN`;$('companies').innerHTML=visible.length?visible.map(c=>{const site=website(c),url=site?(site.match(/^https?:\/\//i)?site:`https://${site}`):'';return `<article class="company-card bracket"><span class="eyebrow">${esc(clean(c.Vertical)||'COMPANY')}</span><h2>${esc(clean(c['Company Name'])||'Unnamed company')}</h2>${primaryName(c)?`<p><strong>CONTACT</strong> ${esc(primaryName(c))}</p>`:''}${email(c)?`<p><a href="mailto:${esc(email(c))}">${esc(email(c))}</a></p>`:''}${url?`<p><a href="${esc(url)}" target="_blank" rel="noopener">Visit website ↗</a></p>`:''}${clean(c.Manufacturer).toLowerCase()==='yes'?'<span class="tag">MANUFACTURER</span>':''}${clean(c.Distributor).toLowerCase()==='yes'?'<span class="tag">DISTRIBUTOR</span>':''}</article>`}).join(''):'<div class="empty">No assigned companies match your search.</div>'}async function init(){try{const me=await fetch('/api/me');if(!me.ok)return location.replace('login-new.html');const u=(await me.json()).user;if(u.role!=='user')return location.replace('admin.html');$('identity').textContent=`${u.name.toUpperCase()} // USER ACCESS`;$('sessionName').textContent=u.name.toUpperCase();const r=await fetch('/api/companies');if(!r.ok)throw Error();rows=(await r.json()).companies;$('count').textContent=rows.length;render()}catch{location.replace('login-new.html')}}$('search').oninput=render;$('logoutBtn').onclick=async()=>{await fetch('/api/logout',{method:'POST'});location.replace('login-new.html')};init();</script></body></html>
