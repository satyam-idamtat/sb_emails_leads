<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SourceBuddy // Secure Access</title><link rel="stylesheet" href="style.css"><link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"><style>body{min-height:100vh;overflow:auto;display:grid;place-items:center;padding:28px;background-color:var(--void)}.login-bg{position:fixed;inset:0;z-index:0;background:linear-gradient(115deg,rgba(3,8,15,.9),rgba(3,8,15,.55)),url('background-image.png') center/cover}.login-bg:after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(79,168,216,.06) 0 1px,transparent 1px 46px),repeating-linear-gradient(90deg,rgba(79,168,216,.06) 0 1px,transparent 1px 46px)}.access-shell{position:relative;z-index:1;display:grid;grid-template-columns:1.1fr .9fr;width:min(1040px,100%);min-height:570px;border:1px solid var(--border);box-shadow:0 28px 80px rgba(0,0,0,.55);background:rgba(13,24,38,.78);backdrop-filter:blur(18px);animation:arrival .65s cubic-bezier(.2,.8,.2,1)}.access-intro{padding:58px 52px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid var(--border);background:linear-gradient(145deg,rgba(22,40,62,.68),rgba(6,11,19,.32))}.access-intro h1{font-size:clamp(48px,7vw,82px);line-height:.84;color:var(--text);max-width:430px}.access-intro h1 span{color:var(--cyan)}.access-intro p{max-width:390px;color:var(--muted);line-height:1.7;margin-top:24px}.status-row{display:flex;gap:18px;align-items:center;font:11px 'DM Mono';color:var(--cyan);letter-spacing:.12em}.pulse{width:9px;height:9px;border-radius:50%;background:var(--ops-green);box-shadow:0 0 0 0 rgba(61,220,132,.6);animation:pulse 1.8s infinite}.access-card{padding:58px 46px;display:flex;flex-direction:column;justify-content:center}.access-card h2{font-size:36px;color:var(--cyan)}.access-card>p{color:var(--muted);margin:7px 0 29px}.access-card label{display:block;font:11px 'DM Mono';letter-spacing:.13em;color:var(--amber);margin:17px 0 7px}.field{position:relative}.field i{position:absolute;left:14px;top:15px;color:var(--muted);font-size:13px}.access-card input{width:100%;padding:13px 13px 13px 40px;background:rgba(6,11,19,.74);border:1px solid var(--border);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}.access-card input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(79,216,224,.12)}.access-card button{width:100%;margin-top:28px;padding:14px;background:var(--amber);border:1px solid var(--amber);color:var(--void);font:700 14px 'Space Grotesk';letter-spacing:.08em;cursor:pointer;transition:transform .2s,box-shadow .2s}.access-card button:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(255,176,32,.25)}.access-card button:disabled{opacity:.7;cursor:wait}.access-error{min-height:22px;color:var(--alert-red);margin-top:15px;font-size:13px}.security-note{font:10px 'DM Mono';letter-spacing:.04em;color:var(--muted);margin-top:22px;line-height:1.6}@keyframes arrival{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:none}}@keyframes pulse{70%{box-shadow:0 0 0 8px rgba(61,220,132,0)}100%{box-shadow:0 0 0 0 rgba(61,220,132,0)}}@media(max-width:760px){body{padding:16px}.access-shell{grid-template-columns:1fr;min-height:0}.access-intro{padding:36px 30px;border-right:0;border-bottom:1px solid var(--border);min-height:260px}.access-intro h1{font-size:54px}.access-card{padding:36px 30px}.status-row{margin-top:32px}}</style></head><body><div class="login-bg" aria-hidden="true"></div><main class="access-shell bracket"><section class="access-intro"><div><span class="eyebrow">SOURCEBUDDY // COMMAND ACCESS</span><h1>Mission <span>control.</span></h1><p>Securely access your assigned aerospace and defence directory operations.</p></div><div class="status-row"><span class="pulse"></span><span>SECURE SYSTEM ONLINE</span></div></section><section class="access-card"><span class="eyebrow">IDENTITY VERIFICATION</span><h2>Welcome back</h2><p>Enter your credentials to continue.</p><form id="loginForm"><label for="username">USERNAME</label><div class="field"><i class="fa-regular fa-user"></i><input id="username" autocomplete="username" required autofocus></div><label for="password">PASSWORD</label><div class="field"><i class="fa-solid fa-lock"></i><input id="password" type="password" autocomplete="current-password" required></div><button id="submitBtn"><span>Authenticate</span> <i class="fa-solid fa-arrow-right"></i></button><div id="error" class="access-error" role="alert"></div></form><p class="security-note"><i class="fa-solid fa-shield-halved"></i> SESSION PROTECTED // AUTHORIZED PERSONNEL ONLY</p></section></main><script>const form=document.getElementById('loginForm'),error=document.getElementById('error'),submit=document.getElementById('submitBtn');async function go(){try{const s=await fetch('/api/setup-status').then(r=>r.json());if(s.needsSetup)location.replace('setup.html')}catch{error.textContent='Secure server unavailable. Start it with node server.js.'}}go();form.onsubmit=async e=>{e.preventDefault();error.textContent='';submit.disabled=true;submit.querySelector('span').textContent='Authenticating';try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username.value,password:password.value})});const d=await r.json();if(!r.ok){error.textContent=d.error;return}location.replace(d.user.role==='admin'?'admin.html':'index.html')}catch{error.textContent='Unable to reach the secure server. Start it with node server.js.'}finally{submit.disabled=false;submit.querySelector('span').textContent='Authenticate'}}</script></body></html>
