<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SourceBuddy // Initial Setup</title><link rel="stylesheet" href="style.css"><link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"><style>body{min-height:100vh;overflow:auto;padding:32px}.setup{width:min(940px,100%);margin:auto;background:rgba(13,24,38,.94);padding:34px;border:1px solid var(--border)}h1{font-size:42px;color:var(--cyan)}p{color:var(--muted);margin:8px 0 24px}.admins{display:grid;grid-template-columns:1fr 1fr;gap:18px}.admin{background:var(--deck-2);padding:18px;border:1px solid var(--border)}label{display:block;font-family:'DM Mono';font-size:11px;color:var(--amber);margin-top:12px}input{display:block;width:100%;margin-top:6px;padding:10px;background:var(--void);color:var(--text);border:1px solid var(--border)}button{margin-top:22px;padding:12px 20px}.error{color:var(--alert-red);margin-left:15px}@media(max-width:700px){.admins{grid-template-columns:1fr}}</style></head><body><main class="setup bracket"><span class="eyebrow">SOURCEBUDDY // INITIALIZATION</span><h1>First-Time Setup</h1><p>Create the first administrator. A second admin is optional and can be created later from the Admin Dashboard.</p><form id="form"><div class="admins"><section class="admin"><span class="eyebrow">ADMIN 01 // REQUIRED</span><label>NAME<input name="name" required></label><label>USERNAME<input name="username" required></label><label>PASSWORD (8+ CHARACTERS)<input name="password" type="password" minlength="8" required></label></section><section class="admin"><span class="eyebrow">ADMIN 02 // OPTIONAL</span><label>NAME<input name="name"></label><label>USERNAME<input name="username"></label><label>PASSWORD<input name="password" type="password" minlength="8"></label></section></div><button class="btn-primary" type="submit">Complete Secure Setup</button><span class="error" id="error"></span></form></main><script>const form=document.getElementById('form'),error=document.getElementById('error');async function check(){try{const d=await fetch('/api/setup-status').then(r=>r.json());if(!d.needsSetup)location.replace('login-new.html')}catch{error.textContent='Secure server is unavailable. Start it with: node server.js'}}check();form.onsubmit=async e=>{e.preventDefault();error.textContent='';const admins=[...form.querySelectorAll('.admin')].map(section=>Object.fromEntries([...section.querySelectorAll('input')].map(input=>[input.name,input.value.trim()])));if(admins[1].username||admins[1].password||admins[1].name){if(!admins[1].username||!admins[1].password||!admins[1].name){error.textContent='Complete all second-admin fields or leave them blank.';return}}else admins.pop();try{const r=await fetch('/api/setup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({admins})}),d=await r.json();if(!r.ok){error.textContent=d.error;return}location.replace('login-new.html')}catch{error.textContent='Unable to reach the secure server. Confirm http://localhost:3000 is open.'}}</script></body></html>
